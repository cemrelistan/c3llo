<style>
        body { font-family: 'IBM Plex Sans', sans-serif; }
        .carbon-input {
            border: none;
            border-bottom: 1px solid #8d8d8d;
            background-color: #f4f4f4;
            height: 40px;
            padding: 0 16px;
            width: 100%;
            transition: border-color 0.2s;
        }
        .carbon-input:focus {
            outline: none;
            border-bottom: 2px solid #0f62fe;
            margin-bottom: -1px;
        }
        .carbon-button {
            height: 48px;
            padding: 0 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 400;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .carbon-button-primary {
            background-color: #0f62fe;
            color: #ffffff;
        }
        .carbon-button-primary:hover {
            background-color: #0043ce;
        }

<body class="bg-background text-on-surface min-h-screen flex flex-col font-body antialiased">
<!-- TopNavBar Omitted: Transactional intent (Login screen) dictates hiding the global navigation shell. -->
<main class="flex-grow flex items-center justify-center p-6 bg-surface-variant">
<div class="w-full max-w-md bg-surface p-8 shadow-sm border border-outline-variant">
<div class="mb-8">
<h1 class="text-2xl font-headline font-semibold text-on-surface mb-2">Admin Login</h1>
<p class="text-sm text-on-surface-variant">Secure access requires authentication.</p>
</div>
<form action="admin.html" class="space-y-6" method="GET">
<div>
<label class="block text-sm font-semibold text-on-surface mb-2" for="password">Password</label>
<div class="relative">
<input class="carbon-input" id="password" name="password" placeholder="Enter password (12345678)" type="password"/>
<span class="material-symbols-outlined absolute right-3 top-2.5 text-on-surface-variant" data-icon="lock">lock</span>
</div>
</div>
<div class="pt-4">
<button class="carbon-button carbon-button-primary w-full" type="submit">
                        Login
                        <span class="material-symbols-outlined ml-auto" data-icon="arrow_right">arrow_right</span>
</button>
</div>
</form>
<div class="mt-8 pt-6 border-t border-outline-variant">
<a class="text-sm text-primary hover:underline flex items-center" href="index.html">
<span class="material-symbols-outlined text-sm mr-2" data-icon="arrow_back">arrow_back</span>
                    Return to Portfolio
                </a>
</div>
</div>
</main>
